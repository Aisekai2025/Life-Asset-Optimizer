<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --red: #fc8181; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #4a5568; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #4a5568; background: #1a202c; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .check-item { background: #1a202c; padding: 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; }
        .check-item.active { background: var(--teal); color: #1a202c; font-weight: bold; border-color: var(--teal); }
        .type-label { font-size: 0.6rem; color: #718096; grid-column: span 2; margin-top: 5px; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; }
        .stat-val { font-size: 1.8rem; font-weight: bold; }
        #log-display { border-left: 3px solid var(--teal); padding-left: 15px; font-size: 0.8rem; margin-top: 10px; color: #cbd5e0; }
        .budget-bar { height: 8px; background: #4a5568; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .budget-fill { height: 100%; background: var(--teal); transition: 0.3s; }
    </style>
</head>
<body>

    <!-- 初期設定 -->
    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal);">初期設定</h2>
            <label style="font-size: 0.7rem;">貯蓄額（万円）</label><input type="number" id="init-savings" value="100">
            <label style="font-size: 0.7rem;">一ヶ月の食費予算（円）</label><input type="number" id="init-food-budget" value="40000">
            <label style="font-size: 0.7rem;">固定費（家賃等/月 万円）</label><input type="number" id="init-fixed-cost" value="10">
            <button onclick="saveSetup()">システム起動</button>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-screen" class="container hidden">
        <header style="margin-bottom: 15px;">
            <div id="greeting" style="font-size: 1.4rem; font-weight: bold; color: var(--teal);">やあ、いらっしゃい。</div>
            <div id="sub-message" style="color: #a0aec0; font-size: 0.7rem;"></div>
        </header>

        <div class="card" style="display: flex; justify-content: space-around; padding: 1rem;">
            <div style="text-align: center;">
                <div style="font-size: 0.5rem; color: #718096;">健康スコア</div>
                <div id="health-score" class="stat-val text-teal-400">--</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.5rem; color: #718096;">食費残高</div>
                <div id="food-budget-val" class="stat-val" style="color: #f6e05e;">--</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.5rem; color: #718096;">生存日数</div>
                <div id="survival-days" class="stat-val" style="color: #63b3ed;">--</div>
            </div>
        </div>

        <div class="card">
            <div class="budget-bar"><div id="budget-fill" class="budget-fill"></div></div>
            <div id="budget-warn" style="font-size: 0.6rem; margin-top:5px; text-align:right;"></div>
        </div>

        <div class="card">
            <div class="checklist">
                <div class="type-label">【自炊：身体資産への投資】</div>
                <div class="check-item" onclick="toggleItem(this, 300, 6)">🌿 野菜セット</div>
                <div class="check-item" onclick="toggleItem(this, 500, 7)">🥩 肉・魚</div>
                <div class="check-item" onclick="toggleItem(this, 100, 5)">🍯 納豆・卵</div>
                
                <div class="type-label">【外食・惣菜：時間の買収とリスク】</div>
                <div class="check-item" onclick="toggleItem(this, 1200, 2)">🍽 レストラン</div>
                <div class="check-item" onclick="toggleItem(this, 800, -5)">🍜 ラーメン・丼</div>
                <div class="check-item" onclick="toggleItem(this, 600, -3)">🍱 コンビニ弁当</div>

                <div class="type-label">【嗜好・休息】</div>
                <div class="check-item" onclick="toggleItem(this, 500, -6)">🍺 お酒</div>
                <div class="check-item" onclick="toggleItem(this, 300, -4)">🍰 スイーツ</div>
            </div>
            <button onclick="commitInvestment()">未来を確定させる</button>
            <div id="log-display"></div>
        </div>
        
        <button onclick="resetSystem()" style="background:none; color:#4a5568; font-size:0.6rem; text-decoration: underline; width:100%;">全データリセット</button>
    </div>

    <script>
        let sPrice = 0, sScore = 0;
        let userData = JSON.parse(localStorage.getItem('optimizer_v2'));

        window.onload = () => {
            if (!userData) { document.getElementById('setup-screen').classList.remove('hidden'); }
            else { document.getElementById('main-screen').classList.remove('hidden'); updateDisplay(); }
        };

        function saveSetup() {
            userData = {
                savings: (parseInt(document.getElementById('init-savings').value)||0)*10000,
                foodBudget: parseInt(document.getElementById('init-food-budget').value)||40000,
                maxFoodBudget: parseInt(document.getElementById('init-food-budget').value)||40000,
                fixedCost: (parseInt(document.getElementById('init-fixed-cost').value)||10)*10000,
                health: parseInt(document.getElementById('init-health')?.value)||60
            };
            localStorage.setItem('optimizer_v2', JSON.stringify(userData));
            location.reload();
        }

        function toggleItem(el, p, s) {
            el.classList.toggle('active');
            let m = el.classList.contains('active') ? 1 : -1;
            sPrice += p * m; sScore += s * m;
        }

        function commitInvestment() {
            if (sPrice === 0 && sScore === 0) return;
            userData.foodBudget -= sPrice;
            userData.health = Math.max(0, Math.min(100, userData.health + sScore));
            localStorage.setItem('optimizer_v2', JSON.stringify(userData));
            updateDisplay();
            document.getElementById('log-display').innerText = sScore > 0 ? "驚きました。見事な投資判断です。" : "今は休息の時だね。無理は禁物だよ。";
            document.querySelectorAll('.check-item').forEach(e => e.classList.remove('active'));
            sPrice = 0; sScore = 0;
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            document.getElementById('food-budget-val').innerText = `¥${userData.foodBudget.toLocaleString()}`;
            
            let dailyTotal = (userData.fixedCost + userData.maxFoodBudget) / 30;
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / dailyTotal);
            
            let pct = (userData.foodBudget / userData.maxFoodBudget) * 100;
            document.getElementById('budget-fill').style.width = `${Math.max(0, pct)}%`;
            if(pct < 20) {
                document.getElementById('budget-fill').style.background = '#fc8181';
                document.getElementById('budget-warn').innerText = "予算が限界に近い。納豆戦術に切り替えようか。";
            }
        }

        function resetSystem() { if(confirm("リセットするのかい？")) { localStorage.removeItem('optimizer_v2'); location.reload(); } }
    </script>
</body>
</html>
