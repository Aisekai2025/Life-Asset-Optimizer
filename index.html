<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #4a5568; }
        .hidden { display: none; }
        .score { font-size: 4rem; color: var(--teal); font-weight: bold; text-align: center; margin: 10px 0; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4a5568; background: #1a202c; color: white; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; }
        #log-display { border-left: 3px solid var(--teal); padding-left: 15px; margin-top: 15px; font-size: 0.9rem; min-height: 50px; }
        svg { width: 100%; height: 100px; }
        polyline { fill: none; stroke: var(--teal); stroke-width: 3; }
    </style>
</head>
<body>
    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal);">初期設定：君の「現在地」を教えて</h2>
            <p style="font-size: 0.8rem; color: #a0aec0; margin-bottom: 20px;">最高峰のプランを組むための質問だよ。</p>
            <label style="font-size: 0.8rem;">今の貯蓄額（万円）</label>
            <input type="number" id="init-savings" placeholder="例：100">
            <label style="font-size: 0.8rem;">最近の体調（1-100）</label>
            <input type="number" id="init-health" placeholder="例：60">
            <label style="font-size: 0.8rem;">一ヶ月の最低生活費（万円）</label>
            <input type="number" id="init-cost" placeholder="例：15">
            <button onclick="saveSetup()">システムを起動する</button>
        </div>
    </div>

    <div id="main-screen" class="container">
        <header style="margin-top: 20px; margin-bottom: 30px;">
            <div id="greeting" style="font-size: 1.8rem; font-weight: bold; color: var(--teal);">...</div>
            <p id="sub-message" style="color: #a0aec0; font-size: 0.8rem;">接続中...</p>
        </header>

        <div class="card">
            <div style="font-size: 0.7rem; color: #718096;">健康資産スコア</div>
            <div id="health-score" class="score">--</div>
        </div>

        <div class="card">
            <div style="font-size: 0.7rem; color: #718096;">未来の安心：生存防衛ライン</div>
            <svg viewBox="0 0 400 100"><polyline id="chart-path" points="0,80 100,75 200,60 300,45 400,20" /></svg>
            <div style="text-align: center; color: #63b3ed; font-size: 0.8rem; margin-top: 10px;">
                あと <span id="survival-days" style="font-size: 1.2rem; font-weight: bold;">--</span> 日間戦えます
            </div>
        </div>

        <div class="card">
            <input type="text" id="item-input" placeholder="例：サバ缶 豆乳 ラーメン">
            <button onclick="analyzeItem()">解析して未来を築く</button>
            <div id="log-display"></div>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; color:#4a5568; font-size:0.7rem;">設定をリセット</button>
    </div>

    <script>
        // 市場価格・栄養価の簡易データベース（内部保持）
        const marketData = {
            "サバ": {price: 200, score: 5}, "鶏": {price: 400, score: 4}, "野菜": {price: 300, score: 3},
            "卵": {price: 250, score: 3}, "納豆": {price: 100, score: 5}, "豆乳": {price: 200, score: 4},
            "ラーメン": {price: 800, score: -5}, "酒": {price: 500, score: -6}, "菓子": {price: 200, score: -4}, "パン": {price: 150, score: -2}
        };

        let userData = JSON.parse(localStorage.getItem('optimizer_data'));

        window.onload = () => {
            if (!userData) {
                document.getElementById('main-screen').classList.add('hidden');
                document.getElementById('setup-screen').classList.remove('hidden');
            } else {
                updateDisplay();
            }
        };

        function saveSetup() {
            const savings = parseInt(document.getElementById('init-savings').value) || 0;
            const health = parseInt(document.getElementById('init-health').value) || 50;
            const cost = parseInt(document.getElementById('init-cost').value) || 15;
            
            userData = { savings: savings * 10000, health: health, monthlyCost: cost * 10000 };
            localStorage.setItem('optimizer_data', JSON.stringify(userData));
            location.reload();
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            const dailyCost = userData.monthlyCost / 30;
            const days = Math.floor(userData.savings / dailyCost);
            document.getElementById('survival-days').innerText = days;
            document.getElementById('greeting').innerText = "やあ、いらっしゃい。";
            document.getElementById('sub-message').innerText = `君の今の貯蓄は${userData.savings.toLocaleString()}円。守りは固まっているよ。`;
        }

        function analyzeItem() {
            const input = document.getElementById('item-input').value;
            let foundPrice = 0;
            let foundScore = 0;

            for (let key in marketData) {
                if (input.includes(key)) {
                    foundPrice += marketData[key].price;
                    foundScore += marketData[key].score;
                }
            }

            if (foundPrice > 0) {
                userData.savings -= foundPrice;
                userData.health += foundScore;
                localStorage.setItem('optimizer_data', JSON.stringify(userData));
                updateDisplay();
                document.getElementById('log-display').innerText = 
                    `驚きました。${foundPrice}円の投資で健康スコアが${foundScore}変化しました。期待以上の成果です。`;
            } else {
                document.getElementById('log-display').innerText = "なるほど、新しいデータを学習中だよ。大切に使おう。";
            }
            document.getElementById('item-input').value = "";
        }
    </script>
</body>
</html>
