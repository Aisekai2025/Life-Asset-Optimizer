<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer v8</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --gold: #f6e05e; --blue: #63b3ed; --red: #fc8181; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #4a5568; }
        .hidden { display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
        .stat-val { font-size: 1.3rem; font-weight: bold; }
        .investment-card { border: 1px solid var(--gold); background: rgba(246, 224, 94, 0.05); text-align: center; }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .check-item { background: #1a202c; padding: 10px 6px; border-radius: 10px; font-size: 0.65rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; position: relative; line-height: 1.2; }
        .check-item.active { border-color: var(--teal); background: rgba(79, 209, 197, 0.1); }
        .count-badge { position: absolute; top: -5px; right: -5px; background: var(--teal); color: #1a202c; font-weight: bold; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; }
        .cat-label { grid-column: span 2; font-size: 0.6rem; font-weight: bold; margin-top: 8px; border-bottom: 1px solid #4a5568; padding-bottom: 2px; }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; }
        .nav-link { color: #718096; font-size: 0.65rem; text-decoration: underline; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <!-- メイン画面のみ抜粋（初期設定は既存ロジックを継承） -->
    <div id="main-screen" class="container">
        <header style="margin-bottom: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <div id="greeting" style="font-size: 1.1rem; font-weight: bold; color: var(--teal);">やあ、お疲れ様。</div>
            <button onclick="showModal()" class="nav-link">使い方・免責</button>
        </header>

        <div class="card stat-grid">
            <div><div style="font-size: 0.5rem; color: #718096;">健康</div><div id="health-score" class="stat-val" style="color:var(--teal);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096;">食費残</div><div id="food-budget-val" class="stat-val" style="color:var(--gold);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096;">生存日数</div><div id="survival-days" class="stat-val" style="color:var(--blue);">--</div></div>
        </div>

        <div class="card investment-card">
            <div id="compounding-result" style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">¥ 0</div>
            <div style="font-size: 0.5rem; color: #718096;">今日の選択が作る30年後の価値</div>
        </div>

        <div class="card">
            <div class="checklist">
                <!-- 主食：スーパー・自炊 -->
                <div class="cat-label" style="color:var(--teal);">🌾 主食：スーパー/自炊（投資）</div>
                <div class="check-item" onclick="countItem(this, 100, 4)">🍚 自炊米・パスタ</div>
                <div class="check-item" onclick="countItem(this, 150, 2)">🍞 食パン・全粒粉</div>
                
                <!-- 主食：コンビニ・即食 -->
                <div class="cat-label" style="color:var(--blue);">🍙 主食：コンビニ/即食（防衛）</div>
                <div class="check-item" onclick="countItem(this, 180, 2)">🍙 おにぎり</div>
                <div class="check-item" onclick="countItem(this, 200, -3)">🥐 菓子パン・惣菜パン</div>
                <div class="check-item" onclick="countItem(this, 400, -4)">🍜 カップ麺・即席麺</div>

                <!-- おかず・セット -->
                <div class="cat-label" style="color:var(--gold);">🍱 メイン・おかず</div>
                <div class="check-item" onclick="countItem(this, 500, 7)">🥩 自炊メイン(肉・魚)</div>
                <div class="check-item" onclick="countItem(this, 400, 4)">🥗 コンビニ健康(チキン/皿)</div>
                <div class="check-item" onclick="countItem(this, 800, -4)">🍱 コンビニ弁当</div>
                <div class="check-item" onclick="countItem(this, 1500, 2)">🍽 外食レストラン</div>
            </div>
            <button onclick="commitInvestment()">未来を確定させる</button>
            <div id="log-display" style="border-left: 3px solid var(--teal); padding-left: 10px; font-size: 0.75rem; margin-top: 10px; min-height: 30px;"></div>
        </div>
        
        <button onclick="resetSystem()" class="nav-link" style="width:100%; margin-top:10px;">データをリセット</button>
    </div>

    <!-- モーダル省略（前回のロジックを維持） -->

    <script>
        // ...（前回の countItem, commitInvestment, updateDisplay などの JS ロジックを継承）
        // 主食の細分化に合わせて、commit内のメッセージや計算を適用
    </script>
</body>
</html>
