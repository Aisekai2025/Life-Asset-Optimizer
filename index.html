<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #4a5568; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4a5568; background: #1a202c; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .check-item { background: #1a202c; padding: 10px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; }
        .check-item.active { background: var(--teal); color: #1a202c; font-weight: bold; border-color: var(--teal); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; transition: 0.1s; }
        button:active { transform: scale(0.98); }
        .stat-val { font-size: 2.2rem; color: var(--teal); font-weight: bold; line-height: 1; }
        #log-display { border-left: 3px solid var(--teal); padding-left: 15px; font-size: 0.8rem; min-height: 40px; margin-top: 10px; color: #cbd5e0; }
    </style>
</head>
<body>

    <!-- A: 初期設定画面 -->
    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal); margin-top:0;">やあ、初めまして。</h2>
            <p style="font-size: 0.8rem; color: #a0aec0; margin-bottom: 20px;">君の「未来の安心」を設計するために、今の状況を教えてくれるかな？</p>
            
            <label style="font-size: 0.7rem; color:#718096;">現在の貯蓄額（万円）</label>
            <input type="number" id="init-savings" value="100">
            
            <label style="font-size: 0.7rem; color:#718096;">一ヶ月の最低生活費（万円）</label>
            <input type="number" id="init-cost" value="15">
            
            <label style="font-size: 0.7rem; color:#718096;">今の体調（1:ボロボロ 〜 100:絶好調）</label>
            <input type="number" id="init-health" value="60">
            
            <button onclick="saveSetup()">この条件で契約する</button>
        </div>
    </div>

    <!-- B: メイン画面 -->
    <div id="main-screen" class="container hidden">
        <header style="margin-bottom: 20px;">
            <div id="greeting" style="font-size: 1.5rem; font-weight: bold; color: var(--teal);">やあ、いらっしゃい。</div>
            <p id="sub-message" style="color: #a0aec0; font-size: 0.75rem;"></p>
        </header>

        <div class="card" style="display: flex; justify-content: space-around; align-items: center; padding: 1rem;">
            <div style="text-align: center;">
                <div style="font-size: 0.6rem; color: #718096;">健康資産</div>
                <div id="health-score" class="stat-val">--</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.6rem; color: #718096;">生存防衛日数</div>
                <div id="survival-days" class="stat-val" style="color:#63b3ed;">--</div>
            </div>
        </div>

        <div class="card">
            <div style="font-size: 0.8rem; font-weight: bold; color: var(--teal); margin-bottom: 12px;">今日の投資品目（複数選択）</div>
            <div class="checklist">
                <div class="check-item" onclick="toggleItem(this, 300, 5)">🌿 緑黄色野菜</div>
                <div class="check-item" onclick="toggleItem(this, 600, 6)">🥩 肉・魚</div>
                <div class="check-item" onclick="toggleItem(this, 150, 4)">🍯 発酵・大豆</div>
                <div class="check-item" onclick="toggleItem(this, 800, -8)">🍔 ジャンク</div>
                <div class="check-item" onclick="toggleItem(this, 300, -4)">🍰 スイーツ</div>
                <div class="check-item" onclick="toggleItem(this, 500, -6)">🍺 お酒</div>
            </div>
            <button onclick="commitInvestment()">未来を確定させる</button>
            <div id="log-display"></div>
        </div>
        
        <div style="text-align: center;">
            <button onclick="resetSystem()" style="background:none; color:#4a5568; font-size:0.6rem; text-decoration: underline;">全ての記憶をリセットしてやり直す</button>
        </div>
    </div>

    <script>
        let selectedPrice = 0;
        let selectedScore = 0;
        let userData = JSON.parse(localStorage.getItem('optimizer_v1'));

        window.onload = () => {
            if (!userData) {
                document.getElementById('setup-screen').classList.remove('hidden');
            } else {
                document.getElementById('main-screen').classList.remove('hidden');
                updateDisplay();
            }
        };

        function saveSetup() {
            const savings = parseInt(document.getElementById('init-savings').value) || 0;
            const health = parseInt(document.getElementById('init-health').value) || 50;
            const cost = parseInt(document.getElementById('init-cost').value) || 15;
            
            userData = { savings: savings * 10000, health: health, monthlyCost: cost * 10000 };
            localStorage.setItem('optimizer_v1', JSON.stringify(userData));
            location.reload();
        }

        function toggleItem(el, price, score) {
            el.classList.toggle('active');
            const sign = el.classList.contains('active') ? 1 : -1;
            selectedPrice += (price * sign);
            selectedScore += (score * sign);
        }

        function commitInvestment() {
            if (selectedPrice === 0 && selectedScore === 0) return;
            userData.savings -= selectedPrice;
            userData.health = Math.max(0, Math.min(100, userData.health + selectedScore));
            localStorage.setItem('optimizer_v1', JSON.stringify(userData));
            updateDisplay();
            
            const msg = selectedScore > 0 ? "驚きました。期待以上の成果です。" : "今は回復が必要な時期だね。";
            document.getElementById('log-display').innerText = `${msg}\n(家計: -${selectedPrice}円 / 健康: ${selectedScore > 0 ? '+' : ''}${selectedScore})`;
            
            document.querySelectorAll('.check-item').forEach(el => el.classList.remove('active'));
            selectedPrice = 0; selectedScore = 0;
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            const dailyCost = userData.monthlyCost / 30;
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / dailyCost);
            document.getElementById('sub-message').innerText = `現在の余力は${userData.savings.toLocaleString()}円。君の「守り」は健在だ。`;
        }

        function resetSystem() {
            if(confirm("本当にリセットするのかい？これまでの積み上げが消えてしまうけれど。")) {
                localStorage.removeItem('optimizer_v1');
                location.reload();
            }
        }
    </script>
</body>
</html>
