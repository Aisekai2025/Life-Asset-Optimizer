<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #4a5568; }
        .hidden { display: none; }
        .score { font-size: 3.5rem; color: var(--teal); font-weight: bold; text-align: center; }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .check-item { background: #1a202c; padding: 10px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; transition: 0.2s; }
        .check-item.active { background: var(--teal); color: #1a202c; font-weight: bold; border-color: var(--teal); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; }
        #log-display { border-left: 3px solid var(--teal); padding-left: 15px; font-size: 0.85rem; min-height: 40px; margin-top: 10px; color: #cbd5e0; }
    </style>
</head>
<body>
    <div id="main-screen" class="container">
        <header style="margin-bottom: 20px;">
            <div id="greeting" style="font-size: 1.5rem; font-weight: bold; color: var(--teal);">やあ、いらっしゃい。</div>
            <p id="sub-message" style="color: #a0aec0; font-size: 0.75rem;">君の資産を守る準備はできているよ。</p>
        </header>

        <div class="card" style="display: flex; justify-content: space-around; align-items: center;">
            <div style="text-align: center;">
                <div style="font-size: 0.6rem; color: #718096; text-transform: uppercase;">健康資産</div>
                <div id="health-score" style="font-size: 2.5rem; color: var(--teal); font-weight: bold;">--</div>
            </div>
            <div style="text-align: center;">
                <div style="font-size: 0.6rem; color: #718096; text-transform: uppercase;">生存日数</div>
                <div id="survival-days" style="font-size: 2.5rem; color: #63b3ed; font-weight: bold;">--</div>
            </div>
        </div>

        <div class="card">
            <div style="font-size: 0.8rem; font-weight: bold; color: var(--teal); margin-bottom: 12px;">今日の投資品目（複数選択可）</div>
            <div class="checklist" id="checklist">
                <!-- カテゴリー化したチェックリスト -->
                <div class="check-item" onclick="toggleItem(this, 'veg', 300, 5)">🌿 緑黄色野菜</div>
                <div class="check-item" onclick="toggleItem(this, 'protein', 600, 6)">🥩 肉・魚</div>
                <div class="check-item" onclick="toggleItem(this, 'fermented', 150, 4)">🍯 発酵・大豆</div>
                <div class="check-item" onclick="toggleItem(this, 'junk', 800, -8)">🍔 ジャンク</div>
                <div class="check-item" onclick="toggleItem(this, 'sweet', 300, -4)">🍰 スイーツ</div>
                <div class="check-item" onclick="toggleItem(this, 'drink', 500, -6)">🍺 お酒</div>
            </div>
            <button onclick="commitInvestment()">この内容で未来を築く</button>
            <div id="log-display"></div>
        </div>
        
        <button onclick="localStorage.clear(); location.reload();" style="background:none; color:#4a5568; font-size:0.6rem; margin-top:20px;">初期設定をリセット</button>
    </div>

    <script>
        let selectedPrice = 0;
        let selectedScore = 0;
        let userData = JSON.parse(localStorage.getItem('optimizer_data')) || { savings: 1000000, health: 60, monthlyCost: 150000 };

        function toggleItem(el, id, price, score) {
            el.classList.toggle('active');
            if (el.classList.contains('active')) {
                selectedPrice += price;
                selectedScore += score;
            } else {
                selectedPrice -= price;
                selectedScore -= score;
            }
        }

        function commitInvestment() {
            if (selectedPrice === 0 && selectedScore === 0) return;

            userData.savings -= selectedPrice;
            userData.health += selectedScore;
            
            // 健康スコア的上下限（0-100）
            userData.health = Math.max(0, Math.min(100, userData.health));
            
            localStorage.setItem('optimizer_data', JSON.stringify(userData));
            updateDisplay();
            
            const msg = selectedScore > 0 ? "驚きました。期待以上の成果です。" : "今は回復が必要な時期だね。";
            document.getElementById('log-display').innerText = `${msg}（支出: ${selectedPrice}円 / 健康: ${selectedScore > 0 ? '+' : ''}${selectedScore}）`;
            
            // 選択解除
            document.querySelectorAll('.check-item').forEach(el => el.classList.remove('active'));
            selectedPrice = 0;
            selectedScore = 0;
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            const dailyCost = userData.monthlyCost / 30;
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / dailyCost);
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
