<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life-Asset Optimizer v14</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --gold: #f6e05e; --blue: #63b3ed; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 8px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        .container { max-width: 400px; width: 100%; display: flex; flex-direction: column; height: 100%; }
        .card { background: var(--card); border-radius: 1rem; padding: 0.7rem; margin-bottom: 0.5rem; border: 1px solid #4a5568; }
        .hidden { display: none !important; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; text-align: center; }
        .stat-val { font-size: 1.1rem; font-weight: bold; }
        .stat-label { font-size: 0.5rem; color: #718096; margin-bottom: 1px; }
        .investment-card { border: 1px solid var(--gold); background: rgba(246, 224, 94, 0.05); text-align: center; padding: 0.4rem; }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; overflow-y: auto; flex-grow: 1; padding-bottom: 5px; }
        .cat-label { grid-column: span 2; font-size: 0.6rem; font-weight: bold; margin-top: 4px; border-bottom: 1px solid #4a5568; color: #a0aec0; }
        .item-card { background: #1a202c; border-radius: 8px; border: 1px solid #4a5568; padding: 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55px; }
        .item-name { font-size: 0.6rem; text-align: center; margin-bottom: 4px; line-height: 1.1; }
        .counter-ui { display: flex; align-items: center; gap: 10px; }
        .c-btn { width: 20px; height: 20px; border-radius: 4px; border: none; font-size: 0.8rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .c-minus { background: #4a5568; color: white; opacity: 0.3; }
        .c-minus.active { opacity: 1; }
        .c-plus { background: var(--teal); color: #1a202c; }
        .c-num { font-size: 0.8rem; font-weight: bold; min-width: 10px; }
        button.primary { width: 100%; padding: 10px; border-radius: 10px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; font-size: 0.9rem; margin-bottom: 5px; }
        .nav-link { color: #718096; font-size: 0.55rem; text-decoration: underline; background: none; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container hidden">
        <div class="card" style="margin-top: 20px;">
            <h2 style="color: var(--teal); font-size: 1.1rem; margin: 0 0 10px 0;">初期設定</h2>
            <label style="font-size:0.6rem;">全貯蓄(万)</label><input style="width:100%; padding:8px; margin-bottom:8px; background:#1a202c; color:white; border:1px solid #4a5568; border-radius:5px;" type="number" id="init-savings" value="100">
            <label style="font-size:0.6rem;">月食費(円)</label><input style="width:100%; padding:8px; margin-bottom:8px; background:#1a202c; color:white; border:1px solid #4a5568; border-radius:5px;" type="number" id="init-food-budget" value="45000">
            <label style="font-size:0.6rem;">固定費(万)</label><input style="width:100%; padding:8px; margin-bottom:8px; background:#1a202c; color:white; border:1px solid #4a5568; border-radius:5px;" type="number" id="init-fixed-cost" value="12">
            <button class="primary" onclick="saveSetup()">開始</button>
        </div>
    </div>

    <div id="main-screen" class="container hidden">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
            <div id="greeting" style="font-size: 0.9rem; font-weight: bold; color: var(--teal);">やあ、お疲れ様。</div>
            <button onclick="openManual()" class="nav-link">使い方・免責</button>
        </header>

        <div class="card stat-grid">
            <div><div class="stat-label">健康</div><div id="health-score" class="stat-val" style="color:var(--teal);">--</div></div>
            <div><div class="stat-label">食費残</div><div id="food-budget-val" class="stat-val" style="color:var(--gold);">--</div></div>
            <div><div class="stat-label">生存日数</div><div id="survival-days" class="stat-val" style="color:var(--blue);">--</div></div>
        </div>

        <div class="card investment-card">
            <div id="compounding-result" style="font-size: 1.2rem; color: var(--gold); font-weight: bold;">¥ 0</div>
            <div style="font-size: 0.5rem; color: #718096;">本日の節約による30年後の価値</div>
        </div>

        <div class="checklist" id="item-grid"></div>

        <div style="padding-top: 5px;">
            <button class="primary" onclick="commitInvestment()">未来を確定させる</button>
            <div id="log-display" style="border-left: 2px solid var(--teal); padding-left: 8px; font-size: 0.65rem; min-height: 24px; color: #cbd5e0; line-height: 1.2; margin-bottom: 5px;"></div>
            <div style="text-align: center;"><button onclick="resetSystem()" class="nav-link">リセット</button></div>
        </div>
    </div>

    <div id="modal-overlay" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div class="card" style="max-width: 280px; background: #1a202c;">
            <p style="font-size: 0.65rem; line-height: 1.4;">＋/－で数量調整し確定。年利5%複利計算。体調は医師へ。</p>
            <button class="primary" onclick="closeManual()" style="padding: 8px;">了解</button>
        </div>
    </div>

    <script>
        const MASTER_ITEMS = [
            { cat: "🌾 主食", name: "🍚 自炊米・麺", p: 100, s: 3 },
            { cat: "🌾 主食", name: "🍞 食パン類", p: 150, s: 1 },
            { cat: "🌾 主食", name: "🍙 おにぎり", p: 180, s: 2 },
            { cat: "🌾 主食", name: "🥯 菓子・惣菜パン", p: 200, s: -3 },
            { cat: "🥩 おかず", name: "🍳 卵・納豆・豆", p: 200, s: 6 },
            { cat: "🥩 おかず", name: "🌿 季節の野菜", p: 300, s: 5 },
            { cat: "🥩 おかず", name: "🥩 肉・魚料理", p: 650, s: 8 },
            { cat: "🥩 おかず", name: "🥗 カット野菜等", p: 350, s: 4 },
            { cat: "🏢 外部", name: "🍱 コンビニ弁当", p: 850, s: -4 },
            { cat: "🏢 外部", name: "🍜 ラーメン・丼", p: 950, s: -5 },
            { cat: "🏢 外部", name: "🍽 外食・会食", p: 1800, s: 2 },
            { cat: "🏢 外部", name: "🍺 お酒・菓子", p: 500, s: -6 }
        ];

        let counts = {};
        let userData = JSON.parse(localStorage.getItem('optimizer_v14'));

        window.onload = () => {
            if (!userData) document.getElementById('setup-screen').classList.remove('hidden');
            else { document.getElementById('main-screen').classList.remove('hidden'); renderGrid(); updateDisplay(); }
        };

        function renderGrid() {
            const grid = document.getElementById('item-grid');
            let lastCat = "";
            MASTER_ITEMS.forEach((item, i) => {
                if (item.cat !== lastCat) {
                    const label = document.createElement('div');
                    label.className = 'cat-label';
                    label.innerText = item.cat;
                    grid.appendChild(label);
                    lastCat = item.cat;
                }
                counts[i] = 0;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `<div class="item-name">${item.name}</div><div class="counter-ui"><button class="c-btn c-minus" id="m-${i}" onclick="changeCount(${i}, -1)">−</button><span class="c-num" id="n-${i}">0</span><button class="c-btn c-plus" onclick="changeCount(${i}, 1)">+</button></div>`;
                grid.appendChild(card);
            });
        }

        function changeCount(i, d) {
            counts[i] = Math.max(0, counts[i] + d);
            document.getElementById(`n-${i}`).innerText = counts[i];
            document.getElementById(`m-${i}`).classList.toggle('active', counts[i] > 0);
        }

        function saveSetup() {
            userData = { savings: (parseFloat(document.getElementById('init-savings').value)||100)*10000, foodBudget: parseInt(document.getElementById('init-food-budget').value)||45000, maxFoodBudget: parseInt(document.getElementById('init-food-budget').value)||45000, fixedCost: (parseFloat(document.getElementById('init-fixed-cost').value)||12)*10000, health: 60 };
            localStorage.setItem('optimizer_v14', JSON.stringify(userData));
            location.reload();
        }

        function commitInvestment() {
            let pTotal = 0, sTotal = 0, has = false;
            MASTER_ITEMS.forEach((item, i) => { if(counts[i]>0){ pTotal += item.p*counts[i]; sTotal += item.s*counts[i]; has=true; }});
            if (!has) return;
            const daily = userData.maxFoodBudget / 30;
            const saved = Math.max(0, daily - pTotal);
            const futureVal = saved * Math.pow(1 + 0.05/12, 12 * 30);
            userData.savings -= pTotal; userData.foodBudget -= pTotal; userData.health = Math.max(0, Math.min(100, userData.health + sTotal));
            localStorage.setItem('optimizer_v14', JSON.stringify(userData));
            updateDisplay();
            document.getElementById('compounding-result').innerText = `¥${Math.floor(futureVal).toLocaleString()}`;
            document.getElementById('log-display').innerText = `驚きました。未来に ¥${Math.floor(futureVal).toLocaleString()} の種を蒔きました。`;
            for(let i in counts){ counts[i]=0; document.getElementById(`n-${i}`).innerText=0; document.getElementById(`m-${i}`).classList.remove('active'); }
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            document.getElementById('food-budget-val').innerText = `¥${userData.foodBudget.toLocaleString()}`;
            const totalDaily = (userData.fixedCost + userData.maxFoodBudget) / 30;
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / totalDaily);
        }

        function openManual() { document.getElementById('modal-overlay').classList.remove('hidden'); }
        function closeManual() { document.getElementById('modal-overlay').classList.add('hidden'); }
        function resetSystem() { if(confirm("リセット？")) { localStorage.removeItem('optimizer_v14'); location.reload(); } }
    </script>
</body>
</html>
