<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer v13</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --gold: #f6e05e; --blue: #63b3ed; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.2rem; padding: 1rem; margin-bottom: 0.8rem; border: 1px solid #4a5568; }
        .hidden { display: none !important; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
        .stat-val { font-size: 1.2rem; font-weight: bold; }
        .investment-card { border: 1px solid var(--gold); background: rgba(246, 224, 94, 0.05); text-align: center; }
        
        /* 2列グリッドの復活 */
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .cat-label { grid-column: span 2; font-size: 0.65rem; font-weight: bold; margin-top: 8px; border-bottom: 1px solid #4a5568; padding-bottom: 2px; color: #a0aec0; }
        
        /* コンパクトカウンターボタン */
        .item-card { background: #1a202c; border-radius: 10px; border: 1px solid #4a5568; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 75px; position: relative; }
        .item-name { font-size: 0.65rem; text-align: center; margin-bottom: 6px; line-height: 1.2; }
        .counter-ui { display: flex; align-items: center; gap: 8px; width: 90%; justify-content: center; }
        .c-btn { width: 22px; height: 22px; border-radius: 4px; border: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.1s; }
        .c-minus { background: #4a5568; color: white; opacity: 0.5; }
        .c-minus.active { opacity: 1; }
        .c-plus { background: var(--teal); color: #1a202c; }
        .c-num { font-size: 0.8rem; font-weight: bold; min-width: 12px; }
        
        button.primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .nav-link { color: #718096; font-size: 0.65rem; text-decoration: underline; background: none; border: none; cursor: pointer; padding: 5px; }
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal); margin-top: 0; font-size: 1.2rem;">やあ、いらっしゃい。</h2>
            <p style="font-size: 0.75rem; color: #a0aec0; margin-bottom: 15px;">初期条件を教えてくれるかな？</p>
            <label style="font-size:0.6rem;">全貯蓄（万円）</label><input style="width:100%; padding:10px; margin-bottom:10px; background:#1a202c; color:white; border:1px solid #4a5568; border-radius:8px;" type="number" id="init-savings" value="100">
            <label style="font-size:0.6rem;">月間食費予算（円）</label><input style="width:100%; padding:10px; margin-bottom:10px; background:#1a202c; color:white; border:1px solid #4a5568; border-radius:8px;" type="number" id="init-food-budget" value="45000">
            <label style="font-size:0.6rem;">固定費（万円/月）</label><input style="width:100%; padding:10px; margin-bottom:10px; background:#1a202c; color:white; border:1px solid #4a5568; border-radius:8px;" type="number" id="init-fixed-cost" value="12">
            <button class="primary" onclick="saveSetup()">資産運用を開始</button>
        </div>
    </div>

    <div id="main-screen" class="container hidden">
        <header style="margin-bottom: 10px; width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <div id="greeting" style="font-size: 1rem; font-weight: bold; color: var(--teal);">やあ、お疲れ様。</div>
            <button onclick="openManual()" class="nav-link">使い方・免責</button>
        </header>

        <div class="card stat-grid" style="padding: 0.8rem;">
            <div><div style="font-size: 0.5rem; color: #718096; margin-bottom: 2px;">健康</div><div id="health-score" class="stat-val" style="color:var(--teal);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096; margin-bottom: 2px;">食費残</div><div id="food-budget-val" class="stat-val" style="color:var(--gold);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096; margin-bottom: 2px;">生存日数</div><div id="survival-days" class="stat-val" style="color:var(--blue);">--</div></div>
        </div>

        <div class="card investment-card" style="padding: 0.6rem;">
            <div id="compounding-result" style="font-size: 1.4rem; color: var(--gold); font-weight: bold;">¥ 0</div>
            <div style="font-size: 0.5rem; color: #718096;">本日の節約による30年後の期待価値</div>
        </div>

        <div class="card">
            <div class="checklist" id="item-grid">
                <!-- JSで2列生成 -->
            </div>
            <button class="primary" onclick="commitInvestment()">未来を確定させる</button>
            <div id="log-display" style="border-left: 3px solid var(--teal); padding-left: 10px; font-size: 0.75rem; margin-top: 10px; min-height: 30px; color: #cbd5e0;"></div>
        </div>
        
        <button onclick="resetSystem()" class="nav-link" style="width:100%; margin-top:10px;">データをリセット</button>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="card" style="max-width: 320px; background: #1a202c;">
            <h3 style="color: var(--teal); margin-top: 0; font-size: 1rem;">使い方</h3>
            <p style="font-size: 0.7rem; line-height: 1.5; color: #cbd5e0;">
                ・各カードの「＋」「－」で数量を調整してください。<br>
                ・確定ボタンを押すと、資産と健康スコアに反映されます。<br>
                ・リセットは全てのデータが消去されます。
            </p>
            <button class="primary" onclick="closeManual()">了解</button>
        </div>
    </div>

    <script>
        const MASTER_ITEMS = [
            { cat: "🌾 主食(ベース)", name: "🍚 自炊米・麺", p: 100, s: 3 },
            { cat: "🌾 主食(ベース)", name: "🍞 食パン類", p: 150, s: 1 },
            { cat: "🌾 主食(ベース)", name: "🍙 おにぎり", p: 180, s: 2 },
            { cat: "🌾 主食(ベース)", name: "🥯 菓子・惣菜パン", p: 200, s: -3 },
            { cat: "🥩 おかず(自炊)", name: "🍳 卵・納豆・豆", p: 200, s: 6 },
            { cat: "🥩 おかず(自炊)", name: "🌿 季節の野菜", p: 300, s: 5 },
            { cat: "🥩 おかず(自炊)", name: "🥩 肉・魚料理", p: 650, s: 8 },
            { cat: "🥩 おかず(自炊)", name: "🥗 カット野菜系", p: 350, s: 4 },
            { cat: "🏢 外部・嗜好", name: "🍱 コンビニ弁当", p: 850, s: -4 },
            { cat: "🏢 外部・嗜好", name: "🍜 ラーメン・丼", p: 950, s: -5 },
            { cat: "🏢 外部・嗜好", name: "🍽 外食・会食", p: 1800, s: 2 },
            { cat: "🏢 外部・嗜好", name: "🍺 お酒・菓子", p: 500, s: -6 }
        ];

        let counts = {};
        let userData = JSON.parse(localStorage.getItem('optimizer_v13'));

        window.onload = () => {
            if (!userData) document.getElementById('setup-screen').classList.remove('hidden');
            else { document.getElementById('main-screen').classList.remove('hidden'); renderGrid(); updateDisplay(); }
        };

        function renderGrid() {
            const grid = document.getElementById('item-grid');
            let lastCat = "";
            MASTER_ITEMS.forEach((item, i) => {
                if (item.cat !== lastCat) {
                    const label = document.createElement('div');
                    label.className = 'cat-label';
                    label.innerText = item.cat;
                    grid.appendChild(label);
                    lastCat = item.cat;
                }
                counts[i] = 0;
                const card = document.createElement('div');
                card.className = 'item-card';
                card.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="counter-ui">
                        <button class="c-btn c-minus" id="m-${i}" onclick="changeCount(${i}, -1)">−</button>
                        <span class="c-num" id="n-${i}">0</span>
                        <button class="c-btn c-plus" onclick="changeCount(${i}, 1)">+</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function changeCount(i, d) {
            counts[i] = Math.max(0, counts[i] + d);
            document.getElementById(`n-${i}`).innerText = counts[i];
            const mBtn = document.getElementById(`m-${i}`);
            if (counts[i] > 0) mBtn.classList.add('active'); else mBtn.classList.remove('active');
        }

        function saveSetup() {
            userData = {
                savings: (parseFloat(document.getElementById('init-savings').value)||100)*10000,
                foodBudget: parseInt(document.getElementById('init-food-budget').value)||45000,
                maxFoodBudget: parseInt(document.getElementById('init-food-budget').value)||45000,
                fixedCost: (parseFloat(document.getElementById('init-fixed-cost').value)||12)*10000,
                health: 60
            };
            localStorage.setItem('optimizer_v13', JSON.stringify(userData));
            location.reload();
        }

        function commitInvestment() {
            let pTotal = 0, sTotal = 0, has = false;
            MASTER_ITEMS.forEach((item, i) => { if(counts[i]>0){ pTotal += item.p*counts[i]; sTotal += item.s*counts[i]; has=true; }});
            if (!has) return;

            const daily = userData.maxFoodBudget / 30;
            const saved = Math.max(0, daily - pTotal);
            const futureVal = saved * Math.pow(1 + 0.05/12, 12 * 30);

            userData.savings -= pTotal;
            userData.foodBudget -= pTotal;
            userData.health = Math.max(0, Math.min(100, userData.health + sTotal));
            localStorage.setItem('optimizer_v13', JSON.stringify(userData));
            
            updateDisplay();
            document.getElementById('compounding-result').innerText = `¥${Math.floor(futureVal).toLocaleString()}`;
            document.getElementById('log-display').innerText = `驚きました。${pTotal}円の投資を確定。未来価値は¥${Math.floor(futureVal).toLocaleString()}です。`;
            
            for(let i in counts){ counts[i]=0; document.getElementById(`n-${i}`).innerText=0; document.getElementById(`m-${i}`).classList.remove('active'); }
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            document.getElementById('food-budget-val').innerText = `¥${userData.foodBudget.toLocaleString()}`;
            const totalDaily = (userData.fixedCost + userData.maxFoodBudget) / 30;
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / totalDaily);
        }

        function openManual() { document.getElementById('modal-overlay').classList.remove('hidden'); }
        function closeManual() { document.getElementById('modal-overlay').classList.add('hidden'); }
        function resetSystem() { if(confirm("リセットしますか？")) { localStorage.removeItem('optimizer_v13'); location.reload(); } }
    </script>
</body>
</html>
