<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --gold: #f6e05e; --blue: #63b3ed; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #4a5568; }
        .hidden { display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: bold; }
        .investment-card { border: 1px solid var(--gold); background: rgba(246, 224, 94, 0.05); }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .check-item { background: #1a202c; padding: 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; }
        .check-item.active { background: var(--teal); color: #1a202c; font-weight: bold; border-color: var(--teal); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; }
        #log-display { border-left: 3px solid var(--teal); padding-left: 15px; font-size: 0.8rem; margin-top: 10px; min-height: 40px; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #4a5568; background: #1a202c; color: #fff; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal); margin-top:0;">初期設定</h2>
            <label style="font-size:0.7rem;">現在の全貯蓄（万円）</label><input type="number" id="init-savings" value="100">
            <label style="font-size:0.7rem;">月間食費予算（円）</label><input type="number" id="init-food-budget" value="45000">
            <label style="font-size:0.7rem;">固定費：家賃・光熱費等（万円/月）</label><input type="number" id="init-fixed-cost" value="12">
            <button onclick="saveSetup()">この条件で「守り」を固める</button>
        </div>
    </div>

    <div id="main-screen" class="container hidden">
        <header style="margin-bottom: 15px;">
            <div id="greeting" style="font-size: 1.4rem; font-weight: bold; color: var(--teal);">やあ、いらっしゃい。</div>
            <div id="sub-message" style="color: #a0aec0; font-size: 0.7rem; margin-top:4px;"></div>
        </header>

        <div class="card stat-grid">
            <div><div style="font-size: 0.5rem; color: #718096;">健康スコア</div><div id="health-score" class="stat-val" style="color:var(--teal);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096;">今月の食費残</div><div id="food-budget-val" class="stat-val" style="color:var(--gold);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096;">生存可能日数</div><div id="survival-days" class="stat-val" style="color:var(--blue);">--</div></div>
        </div>

        <div class="card investment-card">
            <div style="font-size: 0.6rem; color: var(--gold); font-weight: bold;">📊 攻めの資産運用：30年後の未来</div>
            <div id="future-value" style="font-size: 0.8rem; margin-top: 5px; color:#a0aec0;">浮いた食費を年利5%で回せると...</div>
            <div id="compounding-result" style="font-size: 1.6rem; color: var(--gold); font-weight: bold;">¥ --</div>
        </div>

        <div class="card">
            <div style="font-size:0.8rem; font-weight:bold; margin-bottom:10px; color:var(--teal);">今日の支出を計上</div>
            <div class="checklist">
                <div class="check-item" onclick="toggleItem(this, 150, 5)">🍳 自炊(安/高栄養)</div>
                <div class="check-item" onclick="toggleItem(this, 600, 7)">🥩 自炊(並/高栄養)</div>
                <div class="check-item" onclick="toggleItem(this, 800, -4)">🍜 外食(手軽/リスク)</div>
                <div class="check-item" onclick="toggleItem(this, 1500, 2)">🍽 外食(贅沢/精神維持)</div>
                <div class="check-item" onclick="toggleItem(this, 400, -5)">🍺 お酒・菓子</div>
            </div>
            <button onclick="commitInvestment()">ログを確定する</button>
            <div id="log-display"></div>
        </div>
        
        <button onclick="resetSystem()" style="background:none; color:#4a5568; font-size:0.6rem; width:100%; text-decoration:underline;">設定リセット</button>
    </div>

    <script>
        let sPrice = 0, sScore = 0;
        let userData = JSON.parse(localStorage.getItem('optimizer_v4'));

        window.onload = () => {
            if (!userData) { document.getElementById('setup-screen').classList.remove('hidden'); }
            else { document.getElementById('main-screen').classList.remove('hidden'); updateDisplay(); }
        };

        function saveSetup() {
            userData = {
                savings: (parseFloat(document.getElementById('init-savings').value)||100) * 10000,
                foodBudget: parseInt(document.getElementById('init-food-budget').value)||45000,
                maxFoodBudget: parseInt(document.getElementById('init-food-budget').value)||45000,
                fixedCost: (parseFloat(document.getElementById('init-fixed-cost').value)||12) * 10000,
                health: 60,
                startDate: new Date().getTime()
            };
            localStorage.setItem('optimizer_v4', JSON.stringify(userData));
            location.reload();
        }

        function toggleItem(el, p, s) {
            el.classList.toggle('active');
            let m = el.classList.contains('active') ? 1 : -1;
            sPrice += p * m; sScore += s * m;
        }

        function commitInvestment() {
            if (sPrice === 0 && sScore === 0) return;
            userData.savings -= sPrice;
            userData.foodBudget -= sPrice;
            userData.health = Math.max(0, Math.min(100, userData.health + sScore));
            localStorage.setItem('optimizer_v4', JSON.stringify(userData));
            updateDisplay();
            
            const msg = sScore > 0 ? "驚きました。賢明な判断です。" : "今は自分を労るフェーズだね。";
            document.getElementById('log-display').innerText = `${msg}\n(家計: -${sPrice}円 / 健康スコア: ${sScore > 0 ? '+' : ''}${sScore})`;
            
            document.querySelectorAll('.check-item').forEach(e => e.classList.remove('active'));
            sPrice = 0; sScore = 0;
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            document.getElementById('food-budget-val').innerText = `¥${userData.foodBudget.toLocaleString()}`;
            
            // 正確な生存日数の計算: 貯蓄 ÷ (1日あたりの総維持費)
            const dailyFixed = userData.fixedCost / 30;
            const dailyFood = userData.maxFoodBudget / 30;
            const totalDailyOut = dailyFixed + dailyFood;
            const days = Math.floor(userData.savings / totalDailyOut);
            document.getElementById('survival-days').innerText = days;
            
            // 未来資産：予算から「浮かせた」額をベースに複利計算
            const daysPassed = Math.max(1, Math.floor((new Date().getTime() - userData.startDate) / (1000*60*60*24)));
            const budgetUsedSoFar = userData.maxFoodBudget - userData.foodBudget;
            const standardBudgetSoFar = dailyFood * daysPassed;
            const savedAmount = Math.max(0, standardBudgetSoFar - budgetUsedSoFar);
            
            // 月平均に換算
            const monthlySaving = (savedAmount / daysPassed) * 30;
            const rate = 0.05 / 12; // 年利5%
            const months = 12 * 30; // 30年
            // 積立複利公式
            const future = monthlySaving > 0 ? monthlySaving * (Math.pow(1 + rate, months) - 1) / rate : 0;
            
            document.getElementById('compounding-result').innerText = `¥${Math.floor(future).toLocaleString()}`;
            document.getElementById('sub-message').innerText = `総資産: ${userData.savings.toLocaleString()}円。君の基盤はここにある。`;
        }

        function resetSystem() { if(confirm("リセットしてよろしいですか？")) { localStorage.removeItem('optimizer_v4'); location.reload(); } }
    </script>
</body>
</html>
