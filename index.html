<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --gold: #f6e05e; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #4a5568; }
        .hidden { display: none; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; }
        .investment-card { background: linear-gradient(135deg, #2d3748 0%, #1a202c 100%); border: 1px solid var(--gold); }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .check-item { background: #1a202c; padding: 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; }
        .check-item.active { background: var(--teal); color: #1a202c; font-weight: bold; border-color: var(--teal); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; }
        #log-display { border-left: 3px solid var(--gold); padding-left: 15px; font-size: 0.8rem; margin-top: 10px; color: var(--gold); }
    </style>
</head>
<body>

    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal);">初期設定</h2>
            <label style="font-size: 0.7rem;">貯蓄額（万円）</label><input type="number" id="init-savings" value="100">
            <label style="font-size: 0.7rem;">月間食費予算（円）</label><input type="number" id="init-food-budget" value="40000">
            <label style="font-size: 0.7rem;">固定費（万円）</label><input type="number" id="init-fixed-cost" value="10">
            <button onclick="saveSetup()">攻めの運用を開始</button>
        </div>
    </div>

    <div id="main-screen" class="container hidden">
        <header style="margin-bottom: 15px;">
            <div id="greeting" style="font-size: 1.4rem; font-weight: bold; color: var(--teal);">やあ、いらっしゃい。</div>
        </header>

        <div class="card stat-grid">
            <div><div style="font-size: 0.5rem; color: #718096;">健康</div><div id="health-score" class="stat-val" style="color:var(--teal);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096;">食費残</div><div id="food-budget-val" class="stat-val" style="color:var(--gold);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096;">生存日</div><div id="survival-days" class="stat-val" style="color:#63b3ed;">--</div></div>
        </div>

        <!-- 攻めの資産運用カード -->
        <div class="card investment-card">
            <div style="font-size: 0.6rem; color: var(--gold); font-weight: bold;">📊 未来資産シミュレーション</div>
            <div id="future-value" style="font-size: 1.2rem; font-weight: bold; margin-top: 5px;">今の節約ペースなら30年後... </div>
            <div id="compounding-result" style="font-size: 1.6rem; color: var(--gold); font-weight: bold;">¥ --</div>
            <div style="font-size: 0.5rem; color: #718096;">※年利5.0%の複利で運用と仮定</div>
        </div>

        <div class="card">
            <div class="checklist">
                <div class="check-item" onclick="toggleItem(this, 100, 5)">🍳 卵・納豆(自炊)</div>
                <div class="check-item" onclick="toggleItem(this, 500, 7)">🐟 肉・魚(自炊)</div>
                <div class="check-item" onclick="toggleItem(this, 1200, 2)">🍽 外食(贅沢)</div>
                <div class="check-item" onclick="toggleItem(this, 800, -5)">🍜 外食(手軽)</div>
            </div>
            <button onclick="commitInvestment()">本日のログを確定</button>
            <div id="log-display"></div>
        </div>
        
        <button onclick="resetSystem()" style="background:none; color:#4a5568; font-size:0.6rem; width:100%;">設定リセット</button>
    </div>

    <script>
        let sPrice = 0, sScore = 0;
        let userData = JSON.parse(localStorage.getItem('optimizer_v3'));

        window.onload = () => {
            if (!userData) { document.getElementById('setup-screen').classList.remove('hidden'); }
            else { document.getElementById('main-screen').classList.remove('hidden'); updateDisplay(); }
        };

        function saveSetup() {
            userData = {
                savings: (parseInt(document.getElementById('init-savings').value)||100)*10000,
                foodBudget: parseInt(document.getElementById('init-food-budget').value)||40000,
                maxFoodBudget: parseInt(document.getElementById('init-food-budget').value)||40000,
                fixedCost: (parseInt(document.getElementById('init-fixed-cost').value)||10)*10000,
                health: 60
            };
            localStorage.setItem('optimizer_v3', JSON.stringify(userData));
            location.reload();
        }

        function toggleItem(el, p, s) {
            el.classList.toggle('active');
            let m = el.classList.contains('active') ? 1 : -1;
            sPrice += p * m; sScore += s * m;
        }

        function commitInvestment() {
            if (sPrice === 0 && sScore === 0) return;
            userData.foodBudget -= sPrice;
            userData.health = Math.max(0, Math.min(100, userData.health + sScore));
            localStorage.setItem('optimizer_v3', JSON.stringify(userData));
            updateDisplay();
            
            // 投資効果のフィードバック
            const futureWorth = sPrice * Math.pow(1 + 0.05/12, 12 * 30);
            document.getElementById('log-display').innerText = 
                `驚きました。今日の${sPrice}円の節約を運用に回せば、30年後には約${Math.floor(futureWorth).toLocaleString()}円の価値になりますよ。`;
            
            document.querySelectorAll('.check-item').forEach(e => e.classList.remove('active'));
            sPrice = 0; sScore = 0;
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            document.getElementById('food-budget-val').innerText = `¥${userData.foodBudget.toLocaleString()}`;
            
            let dailyTotal = (userData.fixedCost + (userData.maxFoodBudget / 30));
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / dailyTotal);
            
            // 未来複利計算 (月間平均節約額からの推計)
            let elapsedDays = new Date().getDate();
            let avgDailySaving = (userData.maxFoodBudget - userData.foodBudget) / elapsedDays;
            if(avgDailySaving < 0) avgDailySaving = 0;
            
            let monthlySaving = avgDailySaving * 30;
            let rate = 0.05 / 12;
            let months = 12 * 30;
            // 積立複利計算式: M * ((1+r)^n - 1) / r
            let future = monthlySaving * (Math.pow(1 + rate, months) - 1) / rate;
            document.getElementById('compounding-result').innerText = `¥${Math.floor(future).toLocaleString()}`;
        }

        function resetSystem() { if(confirm("リセットしますか？")) { localStorage.removeItem('optimizer_v3'); location.reload(); } }
    </script>
</body>
</html>
