<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life-Asset Optimizer v10</title>
    <style>
        :root { --teal: #4fd1c5; --bg: #1a202c; --card: #2d3748; --gold: #f6e05e; --blue: #63b3ed; }
        body { background: var(--bg); color: #e2e8f0; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 400px; width: 100%; }
        .card { background: var(--card); border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid #4a5568; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .hidden { display: none !important; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
        .stat-val { font-size: 1.3rem; font-weight: bold; }
        .investment-card { border: 1px solid var(--gold); background: rgba(246, 224, 94, 0.05); text-align: center; }
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .check-item { background: #1a202c; padding: 10px 6px; border-radius: 10px; font-size: 0.65rem; cursor: pointer; border: 1px solid #4a5568; text-align: center; position: relative; line-height: 1.2; transition: 0.1s; }
        .check-item.active { border-color: var(--teal); background: rgba(79, 209, 197, 0.1); }
        .count-badge { position: absolute; top: -6px; right: -6px; background: var(--teal); color: #1a202c; font-weight: bold; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .cat-label { grid-column: span 2; font-size: 0.6rem; font-weight: bold; margin-top: 8px; border-bottom: 1px solid #4a5568; padding-bottom: 2px; color: #a0aec0; }
        button.primary { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--teal); color: #1a202c; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .nav-link { color: #718096; font-size: 0.65rem; text-decoration: underline; background: none; border: none; cursor: pointer; padding: 5px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #4a5568; background: #1a202c; color: #fff; box-sizing: border-box; }
        
        /* モーダルの修正：z-indexを強化 */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container hidden">
        <div class="card">
            <h2 style="color: var(--teal); margin-top: 0;">やあ、いらっしゃい。</h2>
            <p style="font-size: 0.8rem; color: #a0aec0; margin-bottom: 20px;">君の現状を教えてくれるかな？</p>
            <label style="font-size:0.6rem;">全貯蓄（万円）</label><input type="number" id="init-savings" value="100">
            <label style="font-size:0.6rem;">月間食費予算（円）</label><input type="number" id="init-food-budget" value="45000">
            <label style="font-size:0.6rem;">固定費（万円/月）</label><input type="number" id="init-fixed-cost" value="12">
            <button class="primary" onclick="saveSetup()">運用を開始</button>
        </div>
    </div>

    <div id="main-screen" class="container hidden">
        <header style="margin-bottom: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center;">
            <div id="greeting" style="font-size: 1.1rem; font-weight: bold; color: var(--teal);">やあ、お疲れ様。</div>
            <button onclick="openManual()" class="nav-link">使い方・免責</button>
        </header>

        <div class="card stat-grid">
            <div><div style="font-size: 0.5rem; color: #718096; margin-bottom: 4px;">健康</div><div id="health-score" class="stat-val" style="color:var(--teal);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096; margin-bottom: 4px;">食費残</div><div id="food-budget-val" class="stat-val" style="color:var(--gold);">--</div></div>
            <div><div style="font-size: 0.5rem; color: #718096; margin-bottom: 4px;">生存日数</div><div id="survival-days" class="stat-val" style="color:var(--blue);">--</div></div>
        </div>

        <div class="card investment-card">
            <div id="compounding-result" style="font-size: 1.5rem; color: var(--gold); font-weight: bold;">¥ 0</div>
            <div style="font-size: 0.5rem; color: #718096;">今日の選択が作る30年後の価値</div>
        </div>

        <div class="card">
            <div class="checklist">
                <div class="cat-label" style="color:var(--teal);">🌾 主食：スーパー/自炊</div>
                <div class="check-item" onclick="countItem(this, 100, 4)">🍚 自炊米・パスタ</div>
                <div class="check-item" onclick="countItem(this, 150, 2)">🍞 食パン・全粒粉</div>
                <div class="cat-label" style="color:var(--blue);">🍙 主食：コンビニ/即食</div>
                <div class="check-item" onclick="countItem(this, 180, 2)">🍙 おにぎり</div>
                <div class="check-item" onclick="countItem(this, 200, -3)">🥐 菓子パン系</div>
                <div class="check-item" onclick="countItem(this, 400, -4)">🍜 カップ麺等</div>
                <div class="cat-label" style="color:var(--gold);">🍱 メイン・おかず</div>
                <div class="check-item" onclick="countItem(this, 500, 7)">🥩 自炊(肉・魚)</div>
                <div class="check-item" onclick="countItem(this, 400, 4)">🥗 コンビニ健康系</div>
                <div class="check-item" onclick="countItem(this, 1500, 2)">🍽 外食(贅沢)</div>
                <div class="check-item" onclick="countItem(this, 500, -6)">🍺 お酒・菓子</div>
            </div>
            <button class="primary" onclick="commitInvestment()">未来を確定させる</button>
            <div id="log-display" style="border-left: 3px solid var(--teal); padding-left: 10px; font-size: 0.75rem; margin-top: 10px; min-height: 35px; color: #cbd5e0;"></div>
        </div>
        <button onclick="resetSystem()" class="nav-link" style="width:100%;">全リセット</button>
    </div>

    <!-- モーダル（クリックを邪魔しない独立構造） -->
    <div id="modal-overlay" class="hidden">
        <div class="card" style="max-width: 320px; background: #1a202c; pointer-events: auto;">
            <h3 style="color: var(--teal); margin-top: 0;">使い方・免責事項</h3>
            <div style="font-size: 0.75rem; line-height: 1.5; color: #cbd5e0; margin-bottom: 20px;">
                <b>【使い方】</b><br>
                ・品目をタップして連打で個数追加。<br>
                ・確定で資産と健康に反映。<br><br>
                <b>【免責】</b><br>
                ・本アプリはシミュレーションです。結果を保証しません。<br>
                ・年利5%の複利計算。体調は医師に相談を。
            </div>
            <button class="primary" onclick="closeManual()">了解、未来へ進む</button>
        </div>
    </div>

    <script>
        let currentItems = [];
        let userData = JSON.parse(localStorage.getItem('optimizer_v10'));

        window.onload = () => {
            if (!userData) document.getElementById('setup-screen').classList.remove('hidden');
            else { document.getElementById('main-screen').classList.remove('hidden'); updateDisplay(); }
        };

        function saveSetup() {
            userData = {
                savings: (parseFloat(document.getElementById('init-savings').value) || 100) * 10000,
                foodBudget: parseInt(document.getElementById('init-food-budget').value) || 45000,
                maxFoodBudget: parseInt(document.getElementById('init-food-budget').value) || 45000,
                fixedCost: (parseFloat(document.getElementById('init-fixed-cost').value) || 12) * 10000,
                health: 60
            };
            localStorage.setItem('optimizer_v10', JSON.stringify(userData));
            location.reload();
        }

        function countItem(el, p, s) {
            el.classList.add('active');
            let badge = el.querySelector('.count-badge') || document.createElement('div');
            badge.className = 'count-badge';
            badge.innerText = parseInt(badge.innerText || 0) + 1;
            if (!el.querySelector('.count-badge')) el.appendChild(badge);
            currentItems.push({ p, s });
        }

        function commitInvestment() {
            if (!currentItems.length) return;
            const price = currentItems.reduce((a, b) => a + b.p, 0);
            const score = currentItems.reduce((a, b) => a + b.s, 0);
            const daily = userData.maxFoodBudget / 30;
            const futureVal = Math.max(0, daily - price) * Math.pow(1 + 0.05/12, 12 * 30);

            userData.savings -= price;
            userData.foodBudget -= price;
            userData.health = Math.max(0, Math.min(100, userData.health + score));
            localStorage.setItem('optimizer_v10', JSON.stringify(userData));
            updateDisplay();

            document.getElementById('compounding-result').innerText = `¥${Math.floor(futureVal).toLocaleString()}`;
            document.getElementById('log-display').innerText = `驚きました。${currentItems.length}件の計上。\n未来に ¥${Math.floor(futureVal).toLocaleString()} の種を蒔きましたよ。`;
            
            currentItems = [];
            document.querySelectorAll('.check-item').forEach(e => { e.classList.remove('active'); const b = e.querySelector('.count-badge'); if(b) b.remove(); });
        }

        function updateDisplay() {
            document.getElementById('health-score').innerText = userData.health;
            document.getElementById('food-budget-val').innerText = `¥${userData.foodBudget.toLocaleString()}`;
            document.getElementById('survival-days').innerText = Math.floor(userData.savings / ((userData.fixedCost + userData.maxFoodBudget) / 30));
        }

        function openManual() { document.getElementById('modal-overlay').classList.remove('hidden'); }
        function closeManual() { document.getElementById('modal-overlay').classList.add('hidden'); }
        function resetSystem() { if(confirm("全リセットしますか？")) { localStorage.removeItem('optimizer_v10'); location.reload(); } }
    </script>
</body>
</html>
